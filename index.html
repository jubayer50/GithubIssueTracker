<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- css connect -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisyUI  + tailwind connect by cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome connect by cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="h-screen bg-[#F8FAFC] flex justify-center items-center min-h-screen"
  >
    <main class="">
      <div class="w-full sm:w-[520px] bg-white p-8 shadow rounded-lg">
        <div class="text-center mb-6">
          <img
            class="mx-auto w-[100px] mb-6"
            src="./assets/github-logo.png"
            alt=""
          />
          <div>
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
        </div>

        <div>
          <div class="mb-4 flex flex-col">
            <label class="font-medium text-[#3D3746] pb-2" for=""
              >Username</label
            >
            <input
              id="input-name"
              class="p-4 rounded-lg w-full"
              placeholder="Enter Username"
              type="text"
            />
            <p class="text-[14px] mt-1.5 text-[#4A00FF]">Default:admin</p>
          </div>

          <div class="flex flex-col">
            <label class="font-medium text-[#3D3746] pb-2" for=""
              >Password</label
            >
            <input
              id="input-password"
              class="p-4 rounded-lg w-full"
              placeholder="Enter Password"
              type="password"
            />
            <p class="text-[14px] mt-1.5 text-[#4A00FF]">Default:admin123</p>
          </div>

          <button
            id="btn-login"
            class="btn rounded-lg mt-6 w-full bg-[#4A00FF] text-white"
          >
            Sign In
          </button>
        </div>

        <p class="py-8 text-[#1F2937] text-center">OR</p>

        <div class="text-center">
          <p class="text-[#64748B] mb-2">Demo Credentials:</p>
          <div class="text-center bg-[#F8FAFC] p-8 rounded-lg">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
          </div>
        </div>
      </div>
    </main>
    <!-- js connect -->
    <script src="./script/index.js"></script>
  </body>
</html>
