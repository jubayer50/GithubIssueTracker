<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- css connect -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisyUI  + tailwind connect by cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome connect by cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <nav class="shadow bg-white">
      <div class="flex justify-between max-w-[1440px] py-5 px-2 mx-auto">
        <div class="flex items-center gap-4">
          <img class="max-w-8" src="./assets/github-logo.png" alt="" />
          <h2 class="font-semibold md:text-2xl">GitHub Issues Tracker</h2>
        </div>

        <div class="flex items-center gap-4">
          <div class="hidden sm:block">
            <input
              class="input rounded-md"
              placeholder=" Search issues..."
              type="text"
            />
          </div>

          <div>
            <button class="btn bg-[#4A00FF] text-white rounded-md">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </nav>

    <section class="max-w-[1110px] mx-auto mt-[60px]">
      <div class="bg-white p-6 rounded-lg flex gap-3">
        <button class="btn font-medium rounded-md text-white bg-[#4A00FF]">
          All
        </button>
        <button class="btn font-medium rounded-md">Open</button>
        <button class="btn font-medium rounded-md">Closed</button>
      </div>
    </section>

    <!-- js connect -->
    <script src="./script/home.js"></script>
  </body>
</html>
