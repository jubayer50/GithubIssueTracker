<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- css connect -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisyUI  + tailwind connect by cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome connect by cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <main>
      <!-- navigation menu -->
      <nav class="shadow bg-white">
        <div class="flex justify-between max-w-[1440px] py-5 px-2 mx-auto">
          <div class="flex items-center gap-4">
            <img class="max-w-8" src="./assets/github-logo.png" alt="" />
            <h2 class="font-semibold md:text-2xl">GitHub Issues Tracker</h2>
          </div>

          <div class="flex items-center gap-4">
            <div class="hidden sm:block">
              <input
                id="input-search"
                class="input rounded-md"
                placeholder=" Search issues..."
                type="text"
              />
            </div>

            <div>
              <button class="btn bg-[#4A00FF] text-white rounded-md">
                <i class="fa-solid fa-plus"></i> New Issue
              </button>
            </div>
          </div>
        </div>
      </nav>

      <!-- btn section -->
      <section class="max-w-[1110px] mx-auto mt-2 sm:mt-[60px]">
        <div
          class="bg-white p-6 rounded-lg flex gap-3 justify-center sm:justify-start"
        >
          <button
            onclick="toggleStyle('btn-all-tab')"
            id="btn-all-tab"
            class="btn font-medium rounded-md text-white bg-[#4A00FF]"
          >
            All
          </button>
          <button
            onclick="toggleStyle('btn-open-tab')"
            id="btn-open-tab"
            class="btn font-medium rounded-md"
          >
            Open
          </button>
          <button
            onclick="toggleStyle('btn-closed-tab')"
            id="btn-closed-tab"
            class="btn font-medium rounded-md"
          >
            Closed
          </button>
        </div>
      </section>

      <!-- card section header -->
      <section class="max-w-[1110px] mx-auto mt-4 shadow">
        <div
          class="p-6 rounded-t-lg bg-white flex flex-col sm:flex-row justify-center sm:justify-between items-center sm:items-center gap-3"
        >
          <div class="flex items-center gap-2">
            <div class="bg-[#ECE4FF] p-2.5 w-[50px] h-[50px] rounded-full">
              <img class="w-8" src="./assets/Aperture.png" alt="" />
            </div>

            <div>
              <h2 class="font-semibold text-xl text-[#1F2937]">
                <span id="total-issue-number">0</span> Issues
              </h2>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex sm:items-center gap-2">
              <img src="./assets/open-ellipse.png" alt="" />
              <p class="font-medium text[#1F2937]">Open</p>
            </div>

            <div class="flex sm:items-center gap-2">
              <img src="./assets/close-ellipse.png" alt="" />
              <p class="font-medium text[#1F2937]">Close</p>
            </div>
          </div>
        </div>
      </section>

      <!-- card section -->
      <section class="max-w-[1110px] mx-auto p-6 bg-white">
        <!-- leading -->
        <div
          id="spinning-loading"
          class="h-[80vh] flex hidden justify-center items-center"
        >
          <span
            class="loading loading-spinner text-[#4A00FF] loading-lg"
          ></span>
        </div>

        <div
          id="issue-card-container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"
        >
          <!-- card 1 -->
          <!-- <div class="shadow-sm p-4 rounded-md border-t-4 border-[#00A96E]">
            
            <div class="flex justify-between items-center mb-3">
              <img src="./assets/Open-Status.png" alt="" />
              <p
                class="text-[#EF4444] font-medium py-1 px-5 bg-[#FEECEC] rounded-full"
              >
                High
              </p>
            </div>

            <div class="">
              <h3 class="font-semibold text-[14px] text-[#1F2937] mb-2">
                Fix navigation menu on mobile devices
              </h3>
              <p class="text-[12px] text-[#64748B] mb-3">
                The navigation menu doesn't collapse properly on mobile

              </p>
            </div>

            <div
              class="flex gap-1.5 items-center pb-8 border-b-2 border-[#E4E4E7]"
            >
              <div
                class="flex gap-1.5 text-[12px] font-medium items-center border border-[#FECACA] bg-[#FEECEC] rounded-full text-[#EF4444] py-1 px-2"
              >
                <i class="fa-solid fa-bug"></i>
                <p>BUG</p>
              </div>

              <div
                class="flex gap-1.5 text-[12px] font-medium items-center border border-[#FDE68A] bg-[#FFF8DB] rounded-full text-[#D97706] py-1 px-2"
              >
                <i class="fa-regular fa-life-ring"></i>
                <p>HELP WANTED</p>
              </div>
            </div>

            <div class="pt-4">
              <p class="text-[12px] text-[#64748B] mb-2">#1 by john_doe</p>
              <p class="text-[12px] text-[#64748B]">1/15/2024</p>
            </div>
            
          </div> -->
          <!-- card 1 end -->
        </div>
      </section>

      <!-- modal -->
      <section class="max-w-[1110px] mx-auto p-6">
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn" onclick="issue_details_modal.showModal()">
          open modal
        </button>

        <dialog
          id="issue_details_modal"
          class="modal modal-bottom sm:modal-middle"
        >
          <div class="modal-box">
            <h3 class="text-lg text-[#1F2937] font-bold">
              Fix broken image uploads!
            </h3>

            <div class="flex flex-wrap gap-4 items-center py-3">
              <p
                class="text-[12px] font-medium text-white bg-[#00A96E] px-3 py-1 rounded-full"
              >
                Opened
              </p>
              <p class="text-[12px] font-medium text-[#64748B]">
                Opened by Fahim Ahmed
              </p>
              <p class="text-[12px] font-medium text-[#64748B]">22/02/2026</p>
            </div>

            <p class="line-clamp-2 text-[12px] font-medium text-[#64748B]">
              The navigation menu doesn't collapse properly on mobile devices.
              Need to fix the responsive behavior.
            </p>

            <div class="p-4 rounded-lg bg-[#F8FAFC] flex gap-[120px] mt-5">
              <div>
                <p class="text-[12px] font-medium text-[#64748B] mb-2">
                  Assignee:
                </p>
                <p class="font-semibold text-[#1F2937]">Fahim Ahmed</p>
              </div>

              <div>
                <p class="text-[12px] font-medium text-[#64748B] mb-2">
                  Priority:
                </p>
                <p
                  class="text-[12px] font-medium bg-[#EF4444] text-white px-3 py-1 rounded-full"
                >
                  High
                </p>
              </div>
            </div>

            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn bg-[#4A00FF] text-white">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <!-- js connect -->
    <script src="./script/home.js"></script>
  </body>
</html>
